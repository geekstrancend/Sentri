name: Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

defaults:
  run:
    working-directory: web

env:
  # Dummy values so build-time env access doesn't warn/fail; nothing here
  # needs to be a real secret since no live services are contacted at build time.
  DATABASE_URL: "file:./prisma/dev.db"
  NEXTAUTH_URL: "http://localhost:3000"
  NEXTAUTH_SECRET: "ci-placeholder-secret-not-for-production"
  GITHUB_ID: "ci-placeholder"
  GITHUB_SECRET: "ci-placeholder"
  GOOGLE_ID: "ci-placeholder"
  GOOGLE_SECRET: "ci-placeholder"
  STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_ci_placeholder"

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  all-checks-pass:
    name: All Web Checks Pass
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build]
    steps:
      - name: Confirm all web checks passed
        run: echo "All web CI checks have passed!"
