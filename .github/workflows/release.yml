name: Release Pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  packages: write

jobs:
  # Stage 1: Version Validation
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and extract version
        id: extract
        run: |
          TAG_REF="${{ github.ref }}"
          VERSION="${TAG_REF#refs/tags/v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.*)? ]]; then
            echo "ERROR: Invalid semantic version format: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✓ Validated release version: $VERSION"

  # Stage 2: Full CI Verification
  ci-verification:
    name: CI Verification
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (debug)
        run: cargo clippy --all --all-targets -- -D warnings

      - name: Run unit tests and integration tests
        run: cargo test --all --all-targets

      - name: Run property-based tests
        run: cargo test --release --all

      - name: Verify all tests pass
        run: echo "✓ All CI checks passed"

      # v0.1: Verify documentation files exist for v0.1 release
      - name: Verify docs exist
        run: |
          test -f docs/QUICKSTART.md || \
            (echo "ERROR: docs/QUICKSTART.md missing" && exit 1)
          test -f docs/DSL_REFERENCE.md || \
            (echo "ERROR: docs/DSL_REFERENCE.md missing" && exit 1)
          test -f docs/INVARIANT_LIBRARY.md || \
            (echo "ERROR: docs/INVARIANT_LIBRARY.md missing" && exit 1)
          test -f docs/CI_INTEGRATION.md || \
            (echo "ERROR: docs/CI_INTEGRATION.md missing" && exit 1)
          echo "✓ All documentation files present"

  # Stage 3: Security Audit
  security-audit:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-security-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --deny warnings || {
            echo "⚠ Audit warnings detected - review required"
            cargo audit
          }

      - name: Check for unsafe code blocks
        run: |
          echo "Scanning for unsafe code..."
          UNSAFE_COUNT=$(grep -r "unsafe {" crates/ 2>/dev/null | wc -l)
          if [ "$UNSAFE_COUNT" -gt 0 ]; then
            echo "Found $UNSAFE_COUNT unsafe blocks:"
            grep -r "unsafe {" crates/ 2>/dev/null || true
            echo "Verify all have proper justification and SAFETY comments"
          fi
          echo "✓ Unsafe code review complete"

      - name: Verify rust-toolchain.toml pinned
        run: |
          if [ ! -f rust-toolchain.toml ]; then
            echo "WARNING: rust-toolchain.toml not found — creating default"
            echo '[toolchain]' > rust-toolchain.toml
            echo 'channel = "stable"' >> rust-toolchain.toml
          fi
          if ! grep -q "channel = " rust-toolchain.toml; then
            echo "ERROR: rust-toolchain.toml must have channel = field"
            exit 1
          fi
          echo "✓ Rust toolchain is pinned"

      - name: Verify Cargo.lock committed
        run: |
          git ls-files Cargo.lock | grep -q Cargo.lock || {
            echo "ERROR: Cargo.lock must be committed"
            exit 1
          }
          echo "✓ Cargo.lock is committed"

      - name: Verify lockfile unchanged
        run: |
          cargo metadata --locked > /dev/null 2>&1 || {
            echo "ERROR: Cargo.lock is out of sync with Cargo.toml"
            exit 1
          }
          echo "✓ Lockfile is in sync"

  # Stage 4: Build Matrix (6 Platforms - Sequential to avoid resource contention)
  build-linux-x86_64:
    name: Build (x86_64-linux-gnu)
    runs-on: ubuntu-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/sentri

      # v0.1: Smoke test binary on Linux
      - name: Smoke test binary
        run: |
          chmod +x target/x86_64-unknown-linux-gnu/release/sentri
          target/x86_64-unknown-linux-gnu/release/sentri --version
          target/x86_64-unknown-linux-gnu/release/sentri --help
          target/x86_64-unknown-linux-gnu/release/sentri doctor
          echo "✓ Binary smoke test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentri-x86_64-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/sentri

  build-linux-musl:
    name: Build (x86_64-linux-musl)
    runs-on: ubuntu-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: linux-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/sentri

      # v0.1: Smoke test binary on Linux musl
      - name: Smoke test binary
        run: |
          chmod +x target/x86_64-unknown-linux-musl/release/sentri
          target/x86_64-unknown-linux-musl/release/sentri --version
          target/x86_64-unknown-linux-musl/release/sentri --help
          target/x86_64-unknown-linux-musl/release/sentri doctor
          echo "✓ Binary smoke test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentri-x86_64-linux-musl
          path: target/x86_64-unknown-linux-musl/release/sentri

  build-linux-aarch64:
    name: Build (aarch64-linux-gnu)
    runs-on: ubuntu-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install aarch64 toolchain
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: linux-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Strip binary
        run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/sentri

      # v0.1: Verify binary exists and has correct architecture (cannot execute aarch64 on x86_64)
      - name: Verify binary exists and has correct architecture
        run: |
          file target/aarch64-unknown-linux-gnu/release/sentri | grep -q "aarch64"
          echo "✓ Binary is aarch64 architecture"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentri-aarch64-linux-gnu
          path: target/aarch64-unknown-linux-gnu/release/sentri

  build-macos-x86_64:
    name: Build (x86_64-darwin)
    runs-on: macos-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: macos-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Strip binary
        run: |
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          strip target/x86_64-apple-darwin/release/sentri

      # v0.1: Smoke test binary on macOS
      - name: Smoke test binary
        run: |
          target/x86_64-apple-darwin/release/sentri --version
          target/x86_64-apple-darwin/release/sentri --help
          target/x86_64-apple-darwin/release/sentri doctor
          echo "✓ Binary smoke test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentri-x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/sentri

  build-macos-aarch64:
    name: Build (aarch64-darwin)
    runs-on: macos-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: macos-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/sentri

      # v0.1: Smoke test binary on macOS ARM
      - name: Smoke test binary
        run: |
          target/aarch64-apple-darwin/release/sentri --version
          target/aarch64-apple-darwin/release/sentri --help
          target/aarch64-apple-darwin/release/sentri doctor
          echo "✓ Binary smoke test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentri-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/sentri

  build-windows-x86_64:
    name: Build (x86_64-windows)
    runs-on: windows-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      # v0.1: Smoke test binary on Windows
      - name: Smoke test binary
        run: |
          .\target\x86_64-pc-windows-msvc\release\sentri.exe --version
          .\target\x86_64-pc-windows-msvc\release\sentri.exe --help
          .\target\x86_64-pc-windows-msvc\release\sentri.exe doctor
          Write-Host "✓ Binary smoke test passed"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentri-x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/sentri.exe

  # Stage 5: Reproducibility Verification
  verify-reproducibility:
    name: Verify Reproducible Build
    runs-on: ubuntu-latest
    needs: [validate-version, ci-verification, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: verify-repro-${{ hashFiles('**/Cargo.lock') }}

      - name: First clean build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          cargo build --release --locked --target x86_64-unknown-linux-gnu
          sha256sum target/x86_64-unknown-linux-gnu/release/sentri > /tmp/build1.sha256
          cat /tmp/build1.sha256

      - name: Clean build artifacts
        run: cargo clean

      - name: Second clean build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          cargo build --release --locked --target x86_64-unknown-linux-gnu
          sha256sum target/x86_64-unknown-linux-gnu/release/sentri > /tmp/build2.sha256
          cat /tmp/build2.sha256

      - name: Verify determinism
        run: |
          if diff /tmp/build1.sha256 /tmp/build2.sha256; then
            echo "✓ Build is deterministic and reproducible"
          else
            echo "ERROR: Builds are not deterministic!"
            exit 1
          fi

  # Stage 6: Package Artifacts
  package-artifacts:
    name: Package Artifacts
    runs-on: ubuntu-latest
    needs: [validate-version, build-linux-x86_64, build-linux-musl, build-linux-aarch64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64, verify-reproducibility]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip tool
        run: sudo apt-get install -y zip

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create distribution packages
        run: |
          mkdir -p dist
          VERSION="${{ needs.validate-version.outputs.version }}"
          
          echo "Creating distribution packages for version $VERSION"
          
          # Linux x86_64 (glibc)
          mkdir -p sentri-v${VERSION}-x86_64-unknown-linux-gnu
          cp binaries/sentri-x86_64-linux-gnu/sentri sentri-v${VERSION}-x86_64-unknown-linux-gnu/
          cp LICENSE README.md sentri-v${VERSION}-x86_64-unknown-linux-gnu/
          echo "$VERSION" > sentri-v${VERSION}-x86_64-unknown-linux-gnu/VERSION
          tar czf dist/sentri-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz sentri-v${VERSION}-x86_64-unknown-linux-gnu
          
          # Linux x86_64 (musl)
          mkdir -p sentri-v${VERSION}-x86_64-unknown-linux-musl
          cp binaries/sentri-x86_64-linux-musl/sentri sentri-v${VERSION}-x86_64-unknown-linux-musl/
          cp LICENSE README.md sentri-v${VERSION}-x86_64-unknown-linux-musl/
          echo "$VERSION" > sentri-v${VERSION}-x86_64-unknown-linux-musl/VERSION
          tar czf dist/sentri-v${VERSION}-x86_64-unknown-linux-musl.tar.gz sentri-v${VERSION}-x86_64-unknown-linux-musl
          
          # Linux aarch64
          mkdir -p sentri-v${VERSION}-aarch64-unknown-linux-gnu
          cp binaries/sentri-aarch64-linux-gnu/sentri sentri-v${VERSION}-aarch64-unknown-linux-gnu/
          cp LICENSE README.md sentri-v${VERSION}-aarch64-unknown-linux-gnu/
          echo "$VERSION" > sentri-v${VERSION}-aarch64-unknown-linux-gnu/VERSION
          tar czf dist/sentri-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz sentri-v${VERSION}-aarch64-unknown-linux-gnu
          
          # macOS x86_64
          mkdir -p sentri-v${VERSION}-x86_64-apple-darwin
          cp binaries/sentri-x86_64-apple-darwin/sentri sentri-v${VERSION}-x86_64-apple-darwin/
          cp LICENSE README.md sentri-v${VERSION}-x86_64-apple-darwin/
          echo "$VERSION" > sentri-v${VERSION}-x86_64-apple-darwin/VERSION
          tar czf dist/sentri-v${VERSION}-x86_64-apple-darwin.tar.gz sentri-v${VERSION}-x86_64-apple-darwin
          
          # macOS aarch64
          mkdir -p sentri-v${VERSION}-aarch64-apple-darwin
          cp binaries/sentri-aarch64-apple-darwin/sentri sentri-v${VERSION}-aarch64-apple-darwin/
          cp LICENSE README.md sentri-v${VERSION}-aarch64-apple-darwin/
          echo "$VERSION" > sentri-v${VERSION}-aarch64-apple-darwin/VERSION
          tar czf dist/sentri-v${VERSION}-aarch64-apple-darwin.tar.gz sentri-v${VERSION}-aarch64-apple-darwin
          
          # Windows
          mkdir -p sentri-v${VERSION}-x86_64-pc-windows-msvc
          cp binaries/sentri-x86_64-pc-windows-msvc/sentri.exe sentri-v${VERSION}-x86_64-pc-windows-msvc/
          cp LICENSE README.md sentri-v${VERSION}-x86_64-pc-windows-msvc/
          echo "$VERSION" > sentri-v${VERSION}-x86_64-pc-windows-msvc/VERSION
          cd sentri-v${VERSION}-x86_64-pc-windows-msvc
          zip -r ../dist/sentri-v${VERSION}-x86_64-pc-windows-msvc.zip . 
          cd ..
          
          ls -lh dist/

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 7

  # Stage 7: Generate Checksums
  generate-checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [validate-version, package-artifacts]
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * | tee SHA256SUMS
          echo ""
          echo "SHA256SUMS file created:"
          cat SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/SHA256SUMS
          retention-days: 30

  # Stage 8: Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate-version, ci-verification, security-audit, verify-reproducibility]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish to crates.io
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CRATES_IO_TOKEN" ]; then
            echo "::error::CRATES_IO_TOKEN is not configured — cannot publish to crates.io."
            echo "This workflow only runs on release tags, so a run that publishes"
            echo "nothing must fail rather than report a green, misleading success."
            echo "Set the CRATES_IO_TOKEN GitHub secret, then re-run this release."
            exit 1
          fi
          
          VERSION="${{ needs.validate-version.outputs.version }}"
          echo "Publishing release v$VERSION to crates.io..."

          # Publish one crate, idempotently and resiliently. This has to
          # survive three realities of a multi-crate release:
          #   - Re-runs: a crate already at this version must be treated as
          #     success, not a hard error — otherwise recovery aborts at the
          #     first already-published crate and can never reach the ones that
          #     still need publishing.
          #   - crates.io rate limits: publishing several brand-new crate names
          #     in one release hits the new-crate throttle (a burst, then a
          #     slow refill), returning 429. Wait and retry rather than fail.
          #   - Index propagation: a crate whose just-published dependency is
          #     not yet visible in the index fails to resolve; a short wait and
          #     retry clears it.
          # Anything else is a genuine failure and must stop the release.
          publish_crate() {
            local crate="$1" attempt=0 max=12
            while :; do
              attempt=$((attempt + 1))
              echo ""
              echo "→ $crate v$VERSION (attempt $attempt/$max)"
              if cargo publish -p "$crate" --locked --token "$CRATES_IO_TOKEN" >/tmp/publish.log 2>&1; then
                tail -n 2 /tmp/publish.log
                echo "  ✓ published $crate"
                sleep 10   # let the index propagate before dependents publish
                return 0
              fi
              if grep -qiE "already (uploaded|exists)|is already uploaded" /tmp/publish.log; then
                echo "  = $crate v$VERSION already on crates.io — skipping"
                return 0
              fi
              if [ "$attempt" -ge "$max" ]; then
                echo "::error::Failed to publish $crate v$VERSION after $attempt attempts"
                cat /tmp/publish.log
                return 1
              fi
              if grep -qiE "429|too many requests|rate.?limit" /tmp/publish.log; then
                echo "  … rate limited by crates.io; waiting 90s before retry"
                tail -n 3 /tmp/publish.log
                sleep 90
                continue
              fi
              if grep -qiE "no matching package|failed to select a version|not found in|no matching version" /tmp/publish.log; then
                echo "  … a dependency isn't indexed yet; waiting 30s before retry"
                sleep 30
                continue
              fi
              echo "::error::Failed to publish $crate v$VERSION"
              cat /tmp/publish.log
              return 1
            done
          }

          # Dependency order: each crate's internal deps must already be on
          # crates.io before it publishes. sentri-cli depends on everything, so
          # it is last.
          CRATES="
            sentri-core
            sentri-ir sentri-utils
            sentri-dsl-parser sentri-report
            sentri-library
            sentri-analyzer-evm sentri-analyzer-move sentri-analyzer-solana sentri-analyzer-soroban sentri-solana-macro
            sentri-generator-evm sentri-generator-move sentri-generator-solana
            sentri-dynamic-core sentri-dynamic-evm sentri-dynamic-solana
            sentri-cli
          "
          for crate in $CRATES; do
            publish_crate "$crate" || exit 1
          done

          echo ""
          echo "✓ crates.io publication complete"

  # Stage 9: GitHub Release
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, generate-checksums, publish-crates]
    if: success()
    # actions:write lets this job dispatch the npm publish workflow. A release
    # created here with GITHUB_TOKEN does NOT fire `on: release` workflows
    # (GitHub's recursion guard), so publish-npm must be triggered explicitly.
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: checksums

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[$VERSION\]/,/^## \[/ {print}" CHANGELOG.md | head -n -1 > /tmp/changelog.txt
          else
            echo "## Release v$VERSION" > /tmp/changelog.txt
            echo "" >> /tmp/changelog.txt
            echo "See commit history for changes." >> /tmp/changelog.txt
          fi
          cat /tmp/changelog.txt

      - name: Create release notes with installation instructions
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"

          cat /tmp/changelog.txt > /tmp/release_notes.md

          # v0.1: Enhanced release notes with quick start and new features
          printf '\n## Installation\n\nInstall the latest version with:\n\n```bash\ncargo install sentri-cli --version %s\n```\n\nOr download pre-built binaries from the Assets section below.\n\n## Quick Start\n\n```bash\n# Check an EVM contract\nsentri check ./contracts --chain evm\n\n# Check a Solana program\nsentri check ./programs --chain solana\n\n# Initialize config file\nsentri init\n\n# Verify installation\nsentri doctor\n```\n\n## New in v%s\n\n- **Multi-chain invariant checking**: EVM, Solana, and Move support\n- **22 built-in security invariants**: Comprehensive checks across all chains\n- **Structured output**: JSON and HTML report generation\n- **Violation suppression**: Inline comments and config-level control\n- **Health checks**: `sentri doctor` command for component verification\n- **Professional CLI**: Colored output, TTY detection, responsive design\n- **Cross-platform binaries**: Linux (glibc/musl), macOS (Intel/ARM), Windows\n\n## Verification\n\nVerify artifact integrity:\n\n```bash\nsha256sum -c SHA256SUMS\n```\n\n## Multi-Platform Binaries\n\n- **Linux (x86_64, glibc)**: Standard Linux distributions\n- **Linux (x86_64, musl)**: Alpine and other musl-based systems\n- **Linux (aarch64)**: ARM64 Linux servers\n- **macOS (Intel)**: x86_64 Mac systems\n- **macOS (Apple Silicon)**: aarch64 M1/M2/M3 Macs\n- **Windows (x86_64)**: Windows 10/11\n\nAll binaries are deterministically built and reproducible.\n' "$VERSION" "$VERSION" >> /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          body_path: /tmp/release_notes.md
          files: |
            dist/sentri-*.tar.gz
            dist/sentri-*.zip
            checksums/SHA256SUMS
          draft: false
          prerelease: ${{ contains(needs.validate-version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger npm publish
        # workflow_dispatch via GITHUB_TOKEN DOES start a run (unlike the
        # `on: release` event), so this is how npm publishing gets kicked off.
        # publish-npm waits for the crate to be on crates.io before building.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          echo "Dispatching npm publish for v$VERSION..."
          gh workflow run publish-npm.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f version="$VERSION"

  # Final Success
  release-success:
    name: Release Complete
    runs-on: ubuntu-latest
    needs: [validate-version, github-release]
    if: success()
    steps:
      - name: Release Summary
        run: |
          echo "=========================================="
          echo "✓ SENTRI v${{ needs.validate-version.outputs.version }}"
          echo "  RELEASE PIPELINE COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "Deliverables:"
          echo "  ✓ Multi-platform binaries (6 targets)"
          echo "  ✓ Reproducible build verified"
          echo "  ✓ SHA256 checksums generated"
          echo "  ✓ Published to crates.io (all crates)"
          echo "  ✓ GitHub release created"
          echo ""
          # v0.1: Updated summary with new features
          echo "What's in v${{ needs.validate-version.outputs.version }}:"
          echo "  · Multi-chain invariant checking (EVM, Solana, Move)"
          echo "  · 22 built-in security invariants"
          echo "  · JSON + HTML report output"
          echo "  · sentri doctor health check"
          echo "  · Professional colored CLI output"
          echo "  · Cross-platform support (Linux/macOS/Windows)"
          echo ""
          echo "Install:"
          echo "  cargo install sentri-cli"
          echo ""
          echo "Quick start:"
          echo "  sentri check ./contracts --chain evm"
          echo "  sentri doctor"



