name: npm Package CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'sentri-npm/**'
      - '.github/workflows/npm-package-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'sentri-npm/**'
      - '.github/workflows/npm-package-ci.yml'

defaults:
  run:
    working-directory: sentri-npm

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: sentri-npm/package-lock.json

      # The postinstall script downloads the matching platform binary from
      # GitHub Releases; it's designed to warn and continue (not fail) if no
      # release exists yet for the current version, so this is safe to run
      # in CI at any point in the release cycle.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  all-checks-pass:
    name: All npm Package Checks Pass
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Confirm all checks passed
        run: echo "All npm package checks have passed!"
