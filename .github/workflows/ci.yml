name: CI - Production Grade

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTFLAGS: -D warnings

jobs:
  # Strict formatting check
  format:
    name: Format Check (Strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt --all -- --check
        
  # Strict linting with all warnings as errors
  clippy:
    name: Clippy Lint (Strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run clippy strict
        run: cargo clippy --all --all-targets --all-features -- -D warnings -D clippy::all
        
  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
        continue-on-error: true
      
      - name: Run security audit
        run: cargo audit
      
  # Unit tests across all platforms
  test:
    name: Unit Tests (${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run unit tests
        run: cargo test --lib --all --verbose
        
      - name: Run doc tests
        run: cargo test --doc --all
        
  # Beta Rust tests (experimental, non-blocking)
  test-beta:
    name: Unit Tests (beta)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: beta
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run unit tests
        run: cargo test --lib --all --verbose
        
      - name: Run doc tests
        run: cargo test --doc --all
        
  # Property-based tests
  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run property tests
        run: cargo test --tests --verbose
        
  # Security-specific tests
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run security tests
        run: cargo test --tests --verbose
        
  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run integration tests
        run: cargo test --tests --verbose
        
  # CLI behavior tests
  cli-tests:
    name: CLI Behavior Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Build CLI
        run: cargo build --release --bin sentri
      
      # v0.1: Test doctor command in CI (non-TTY environment)
      - name: Run doctor command
        run: cargo run --bin sentri -- doctor
        
      # v0.1: Verify JSON output is valid JSON (non-TTY safety check)
      - name: Verify JSON output is valid JSON
        run: |
          cargo run --bin sentri -- check . --chain evm --format json --output /tmp/sentri-output.json || true
          if [ -f /tmp/sentri-output.json ]; then
            if python3 -c "import json,sys; json.load(open('/tmp/sentri-output.json'))"; then
              echo "✓ JSON output is valid and free of ANSI codes"
            else
              echo "✗ JSON output is malformed — likely ANSI codes in output"
              cat /tmp/sentri-output.json
              exit 1
            fi
          else
            echo "ℹ No JSON output file produced — skipping validation"
          fi
        shell: bash
        
      - name: Run CLI tests
        run: cargo test --tests --verbose
        
  # v0.1: CLI smoke test on all platforms (verifies subcommands work across OSes)
  cli-smoke-test:
    name: CLI Smoke Test
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            bin: ./target/release/sentri
          - os: macos-latest
            bin: ./target/release/sentri
          - os: windows-latest
            bin: ./target/release/sentri.exe
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Build release binary
        run: cargo build --release --bin sentri
        
      - name: Verify --version
        run: ${{ matrix.bin }} --version
        shell: bash
        
      - name: Verify --help
        run: ${{ matrix.bin }} --help
        shell: bash
        
      - name: Verify check --help
        run: ${{ matrix.bin }} check --help
        shell: bash
        
      - name: Verify doctor exits cleanly
        run: ${{ matrix.bin }} doctor
        shell: bash
        
      - name: Verify init creates config (Unix)
        run: |
          mkdir -p /tmp/test-init
          ${{ matrix.bin }} init /tmp/test-init
          test -f /tmp/test-init/.sentri.toml
        shell: bash
        if: runner.os != 'Windows'
        
      - name: Verify init creates config (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path $env:TEMP\test-init
          .\target\release\sentri.exe init $env:TEMP\test-init
          Test-Path "$env:TEMP\test-init\.sentri.toml"
        shell: pwsh
        if: runner.os == 'Windows'
        
  
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
        
      - name: Generate coverage
        run: cargo tarpaulin --all --out Xml --timeout 300
        
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
          
  # Benchmark smoke test
  benchmark:
    name: Benchmark Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run benchmark smoke test
        run: cargo bench --no-run
        
  # Determinism check (run tests multiple times)
  determinism:
    name: Determinism Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests multiple times (determinism)
        run: |
          for i in {1..3}; do
            echo "Run $i"
            cargo test --lib --all || exit 1
          done
        
  # Release build
  build-release:
    name: Build Release Binary
    runs-on: ${{ matrix.os }}
    needs: [format, clippy, test, security-tests, audit]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: sentri
            asset_name: sentri-linux-x86_64
          - os: macos-latest
            artifact_name: sentri
            asset_name: sentri-macos-x86_64
          - os: windows-latest
            artifact_name: sentri.exe
            asset_name: sentri-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release --bin sentri --verbose
      
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/release/${{ matrix.artifact_name }}
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}
          retention-days: 30
          
  # Final status check
  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    # v0.1: Added cli-smoke-test to verify CLI works on all platforms
    needs: [format, clippy, test, integration-tests, cli-tests, cli-smoke-test, coverage, benchmark, determinism, audit]
    steps:
      - name: Confirm all checks passed
        run: echo "All production-grade checks have passed!"
